    <!-- Structured Data - FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is The Trading Diary?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary is a comprehensive crypto trading journal that helps you track, analyze, and review every trade with AI-powered insights. Built exclusively for crypto traders with advanced analytics and automated performance tracking."
          }
        },
        {
          "@type": "Question",
          "name": "Which exchanges are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We support all major crypto exchanges including Binance, Bybit, OKX, Coinbase, Kraken, KuCoin, Gate.io, MEXC, BingX, Bitfinex, and Bitstamp. You can import trades automatically via CSV upload, screenshot, or direct API connection."
          }
        },
        {
          "@type": "Question",
          "name": "Is The Trading Diary free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we offer a free Starter plan with essential features including manual trade logging, interactive charts, journal, risk calculator, and tax report export. Pro ($18/month) and Elite ($30/month) plans unlock advanced analytics, unlimited AI extracts, custom dashboard, and more."
          }
        },
        {
          "@type": "Question",
          "name": "How secure is my trading data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your data is encrypted end-to-end and stored securely on enterprise-grade infrastructure. We never access your exchange accounts directly — API keys are stored with AES encryption and only read-only permissions are required. You can revoke access at any time."
          }
        },
        {
          "@type": "Question",
          "name": "How do I import my trades?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "There are three ways to import trades: (1) Upload a CSV file exported from your exchange, (2) Take a screenshot of your trade history and our AI will extract the data automatically, or (3) Connect your exchange API key for automatic real-time sync. All methods support batch import."
          }
        },
        {
          "@type": "Question",
          "name": "Does The Trading Diary support futures and perpetual contracts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Trading Diary is built specifically for crypto derivatives traders. It fully supports futures, perpetual contracts, leveraged positions, and spot trading. PnL, ROI, fees, and liquidation data are all tracked and analyzed."
          }
        },
        {
          "@type": "Question",
          "name": "What analytics and insights does the platform provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary provides deep performance analytics including win rate, profit factor, average R:R, drawdown analysis, performance by setup and asset, trading psychology tracking, emotion-performance correlation, wealth forecast simulation, fee analysis, and AI-generated insights on your trading patterns."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track my trading psychology and emotions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Psychology module lets you log your emotional state before and after each trade, track behavior patterns like revenge trading or FOMO, and see the direct correlation between your emotions and trading performance. It includes a Daily Lesson Learned system and emotional timeline."
          }
        },
        {
          "@type": "Question",
          "name": "Does The Trading Diary generate tax reports?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Tax Reports feature lets you export your trading history in formats compatible with tax filing. It summarizes realized PnL, fees paid, and trading activity by period, making it easier to report crypto gains and losses."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a mobile app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary is a Progressive Web App (PWA) that works seamlessly on mobile browsers — you can install it to your home screen on iOS and Android for a native app experience. Dedicated iOS and Android apps are coming soon."
          }
        }
      ]
    }
    </script>

      body {

        letter-spacing: 0.12em;

      .skeleton { background: linear-gradient(90deg, rgba(0,255,102,0.02) 25%, rgba(0,255,102,0.08) 50%, rgba(0,255,102,0.02) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
      @keyframes shimmer { 0%, 100% { background-position: 200% 0; } 50% { background-position: -200% 0; } }
