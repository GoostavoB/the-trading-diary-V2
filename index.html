    <!-- Structured Data - FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is The Trading Diary?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary is a comprehensive crypto trading journal that helps you track, analyze, and review every trade with AI-powered insights. Built exclusively for crypto traders with advanced analytics and automated performance tracking."
          }
        },
        {
          "@type": "Question",
          "name": "Which exchanges are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We support all major crypto exchanges including Binance, Bybit, OKX, Coinbase, Kraken, KuCoin, Gate.io, MEXC, BingX, Bitfinex, and Bitstamp. You can import trades automatically via CSV upload, screenshot, or direct API connection."
          }
        },
        {
          "@type": "Question",
          "name": "Is The Trading Diary free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we offer a free Starter plan with essential features including manual trade logging, interactive charts, journal, risk calculator, and tax report export. Pro ($18/month) and Elite ($30/month) plans unlock advanced analytics, unlimited AI extracts, custom dashboard, and more."
          }
        },
        {
          "@type": "Question",
          "name": "How secure is my trading data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your data is encrypted end-to-end and stored securely on enterprise-grade infrastructure. We never access your exchange accounts directly — API keys are stored with AES encryption and only read-only permissions are required. You can revoke access at any time."
          }
        },
        {
          "@type": "Question",
          "name": "How do I import my trades?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "There are three ways to import trades: (1) Upload a CSV file exported from your exchange, (2) Take a screenshot of your trade history and our AI will extract the data automatically, or (3) Connect your exchange API key for automatic real-time sync. All methods support batch import."
          }
        },
        {
          "@type": "Question",
          "name": "Does The Trading Diary support futures and perpetual contracts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Trading Diary is built specifically for crypto derivatives traders. It fully supports futures, perpetual contracts, leveraged positions, and spot trading. PnL, ROI, fees, and liquidation data are all tracked and analyzed."
          }
        },
        {
          "@type": "Question",
          "name": "What analytics and insights does the platform provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary provides deep performance analytics including win rate, profit factor, average R:R, drawdown analysis, performance by setup and asset, trading psychology tracking, emotion-performance correlation, wealth forecast simulation, fee analysis, and AI-generated insights on your trading patterns."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track my trading psychology and emotions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Psychology module lets you log your emotional state before and after each trade, track behavior patterns like revenge trading or FOMO, and see the direct correlation between your emotions and trading performance. It includes a Daily Lesson Learned system and emotional timeline."
          }
        },
        {
          "@type": "Question",
          "name": "Does The Trading Diary generate tax reports?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Tax Reports feature lets you export your trading history in formats compatible with tax filing. It summarizes realized PnL, fees paid, and trading activity by period, making it easier to report crypto gains and losses."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a mobile app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary is a Progressive Web App (PWA) that works seamlessly on mobile browsers — you can install it to your home screen on iOS and Android for a native app experience. Dedicated iOS and Android apps are coming soon."
          }
        },
        {
          "@type": "Question",
          "name": "How does The Trading Diary compare to a spreadsheet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A spreadsheet requires manual entry for every trade, does not understand leverage, funding fees, or liquidation mechanics, and has no guardrails against revenge trading. The Trading Diary removes the friction with AI screenshot extraction, CSV import, and API sync, and adds automated analytics, psychology tracking, and daily loss locks. Traders typically abandon spreadsheets within a month but stay with The Trading Diary because it is maintenance-free and crypto-native."
          }
        },
        {
          "@type": "Question",
          "name": "What is a profit factor and how do I improve it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Profit factor is gross profit divided by gross loss — a value above 1.5 is considered healthy, above 2 is strong. You improve it by cutting losing trades quicker, letting winners run closer to their full target, and filtering out low-edge setups. The Trading Diary shows your profit factor overall, by setup, and by asset, so you can see exactly which trades are dragging the number down and eliminate them."
          }
        },
        {
          "@type": "Question",
          "name": "Can AI really extract trades from screenshots?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Trading Diary's AI reads screenshots of trade history and position panels from major crypto exchanges and automatically extracts asset, direction, leverage, entry, exit, size, PnL, fees, and timestamp. Most screenshots are parsed in under 10 seconds and the trader reviews the result before saving, so manual typing is eliminated."
          }
        },
        {
          "@type": "Question",
          "name": "How much does The Trading Diary cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary has three plans: Starter is free forever and includes manual trade logging, charts, journal, risk calculator, and tax-report export. Pro is $18 per month and adds unlimited AI trade extractions, advanced analytics, custom dashboards, and the psychology module. Elite is $30 per month and adds priority support, extended integrations, and deeper psychology tools. Annual billing offers a discount."
          }
        },
        {
          "@type": "Question",
          "name": "Is The Trading Diary good for beginners?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Beginners benefit the most from a journal because discipline and self-awareness are the skills that separate profitable traders from the rest. The Trading Diary onboards new users with a simple manual entry flow, built-in risk calculator, and daily loss lock so inexperienced traders cannot accidentally blow up their account. Advanced analytics unlock as the user logs more trades."
          }
        },
        {
          "@type": "Question",
          "name": "What makes a good trading journal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A good trading journal captures every trade with minimal friction, enforces risk discipline, tags psychology, and surfaces patterns the trader cannot see on their own. It must be crypto-aware for derivatives traders — handling leverage, funding, and liquidation — and it should give the trader actionable breakdowns by setup, asset, and emotional state. The Trading Diary was built specifically to meet these criteria."
          }
        },
        {
          "@type": "Question",
          "name": "How do I track my crypto trades automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Diary offers three automated methods: upload a CSV exported from your exchange, drop a screenshot of your trade history (AI extracts the data), or connect a read-only API key for ongoing sync. All three populate the journal with asset, direction, size, leverage, entry, exit, PnL, and fees so you never have to type a trade manually."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between The Trading Diary and TradingView's journal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TradingView's journal is a lightweight feature attached to its charting product — fine for casual tracking but shallow on analytics, with no AI extraction, no psychology tracking, no risk guardrails, and no tax reports. The Trading Diary is a dedicated journaling platform focused entirely on helping crypto traders capture, analyze, and improve their trades, with crypto-native handling of perpetual futures and multi-exchange unification."
          }
        }
      ]
    }
    </script>
